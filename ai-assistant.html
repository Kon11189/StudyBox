<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>StudyBox AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <style>
        /* ===== Защита от спарсинга: ключевые строки разбиты через псевдо-элементы и CSS-переменные ===== */
        :root {
            --bg: #0a0a0e;
            --txt: #e0e0e0;
            --glass: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.06);
            --accent: #ffffff;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--txt); font-family:'Inter',sans-serif; font-weight:300; -webkit-font-smoothing:antialiased; }
        /* прелоадер */
        .preloader { position:fixed; inset:0; z-index:9999; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity 0.8s ease; }
        .preloader.hidden { opacity:0; pointer-events:none; }
        .preloader-logo { font-size:32px; font-weight:500; color:#fff; font-family:'Montserrat',sans-serif; letter-spacing:-0.5px; margin-bottom:24px; }
        .progress-container { width:160px; height:3px; background:rgba(255,255,255,0.08); border-radius:4px; overflow:hidden; }
        .progress-bar { width:0%; height:100%; background:#fff; border-radius:4px; animation:loadBar 1s cubic-bezier(0.77,0,0.175,1) forwards; }
        @keyframes loadBar { 0%{width:0%}100%{width:100%} }

        /* header */
        .header { position:fixed; top:0; left:0; width:100%; z-index:200; padding:16px 20px; background:rgba(10,10,14,0.7); backdrop-filter:blur(16px); border-bottom:1px solid rgba(255,255,255,0.02); display:flex; align-items:center; justify-content:space-between; }
        .header__logo { font-size:18px; font-family:'Montserrat',sans-serif; font-weight:500; color:#fff; text-decoration:none; }
        .header__back { color:#888; text-decoration:none; font-size:14px; display:flex; align-items:center; gap:6px; transition:color 0.3s; }
        .header__back:hover { color:#fff; }

        /* hello */
        .hello-screen { position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); text-align:center; width:100%; padding:0 20px; transition:opacity 0.6s ease, transform 0.6s ease; pointer-events:none; }
        .hello-screen.hidden { opacity:0; transform:translate(-50%,-60%); }
        .hello-title { font-family:'Montserrat',sans-serif; font-size:clamp(32px,6vw,48px); font-weight:500; letter-spacing:-1px; background:linear-gradient(90deg,#fff,#888); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

        /* chat */
        .chat-container { height:100%; padding:80px 20px 140px 20px; overflow-y:auto; scroll-behavior:smooth; max-width:860px; margin:0 auto; display:flex; flex-direction:column; }
        .message { margin-bottom:32px; opacity:0; animation:fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards; line-height:1.7; font-size:16px; word-wrap:break-word; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .message-sender { font-family:'Montserrat',sans-serif; font-size:13px; font-weight:500; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
        .message.user .message-sender { color:#fff; }
        .message.ai .message-sender { color:#888; }
        .message.ai p { margin-bottom:14px; }
        .message.ai p:last-child { margin-bottom:0; }
        .message.ai strong { font-weight:600; color:#fff; }
        .message.ai blockquote { border-left:3px solid rgba(255,255,255,0.15); margin:16px 0; padding:4px 0 4px 16px; color:#aaa; background:rgba(255,255,255,0.02); border-radius:0 8px 8px 0; }
        .message-content img { max-width:100%; height:auto; border-radius:16px; margin:12px 0; cursor:pointer; border:1px solid rgba(255,255,255,0.06); box-shadow:0 4px 20px rgba(0,0,0,0.15); transition:transform 0.3s; display:block; }
        .message-content img:hover { transform:scale(1.01); }
        .image-gallery { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin:16px 0; }
        .image-gallery img { margin:0; aspect-ratio:1; }

        /* таблицы, код, формулы */
        .table-wrapper { width:100%; overflow-x:auto; margin:24px 0; border-radius:12px; background:rgba(255,255,255,0.015); border:1px solid rgba(255,255,255,0.04); }
        table { width:100%; min-width:500px; border-collapse:collapse; font-size:14px; }
        th, td { padding:14px 18px; text-align:left; border-bottom:1px solid rgba(255,255,255,0.04); }
        th { background:rgba(255,255,255,0.03); font-weight:500; color:#fff; }
        .code-block-wrapper { position:relative; margin:24px 0; border-radius:14px; overflow:hidden; background:#0f0f13; border:1px solid rgba(255,255,255,0.04); }
        .code-header { display:flex; justify-content:space-between; align-items:center; padding:10px 16px; background:rgba(255,255,255,0.02); border-bottom:1px solid rgba(255,255,255,0.03); font-size:12px; color:#888; }
        .copy-btn { background:none; border:none; color:#888; cursor:pointer; transition:color 0.3s; display:flex; align-items:center; gap:6px; font-size:12px; }
        .copy-btn:hover { color:#fff; }
        pre { margin:0; padding:16px; overflow-x:auto; }
        code { font-family:'Fira Code',monospace; font-size:13.5px; }

        /* индикатор печати (анимированные точки) */
        .typing-indicator { display:flex; align-items:center; gap:6px; padding:12px 0 18px 0; }
        .typing-dot { width:10px; height:10px; border-radius:50%; background:#888; animation:dotPulse 1.4s infinite both; }
        .typing-dot:nth-child(1) { animation-delay:-0.32s; }
        .typing-dot:nth-child(2) { animation-delay:-0.16s; }
        .typing-dot:nth-child(3) { animation-delay:0s; }
        @keyframes dotPulse { 0%,80%,100%{transform:scale(0.6); opacity:0.3} 40%{transform:scale(1); opacity:1} }

        /* input */
        .input-area { position:fixed; bottom:0; left:0; width:100%; padding:20px; background:linear-gradient(to top,rgba(10,10,14,1) 60%,rgba(10,10,14,0)); display:flex; justify-content:center; z-index:100; pointer-events:none; }
        .input-wrapper { position:relative; width:100%; max-width:820px; pointer-events:auto; background:rgba(255,255,255,0.03); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.06); border-radius:24px; padding:12px; box-shadow:0 10px 40px rgba(0,0,0,0.3); transition:all 0.3s; }
        .input-wrapper:focus-within { border-color:rgba(255,255,255,0.15); background:rgba(255,255,255,0.05); }
        .attachments-container { display:none; flex-wrap:wrap; gap:10px; margin-bottom:10px; }
        .attachment-item { position:relative; width:64px; height:64px; border-radius:12px; background:#1a1a1f; overflow:hidden; border:1px solid rgba(255,255,255,0.1); flex-shrink:0; }
        .attachment-item img { width:100%; height:100%; object-fit:cover; cursor:pointer; transition:transform 0.3s; }
        .attachment-item img:hover { transform:scale(1.05); }
        .attachment-remove { position:absolute; top:4px; right:4px; background:rgba(0,0,0,0.7); color:#fff; border:none; border-radius:50%; width:20px; height:20px; font-size:12px; cursor:pointer; backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; }
        .attachment-remove:hover { background:rgba(255,50,50,0.8); }
        .input-row { display:flex; align-items:flex-end; gap:12px; }
        .plus-btn { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#ccc; border-radius:50%; width:40px; height:40px; flex-shrink:0; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.3s; }
        .plus-btn:hover { background:rgba(255,255,255,0.1); color:#fff; }
        .plus-btn svg { width:20px; height:20px; stroke:currentColor; stroke-width:2; fill:none; }
        textarea { width:100%; background:transparent; border:none; color:#fff; font-size:16px; font-family:inherit; resize:none; outline:none; padding:8px 0; height:40px; line-height:24px; max-height:200px; font-weight:300; transition:height 0.1s; }
        textarea::placeholder { color:#666; }
        .send-btn { background:#fff; color:#0a0a0e; border:none; border-radius:50%; width:40px; height:40px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:all 0.3s; }
        .send-btn:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(255,255,255,0.2); }
        .send-btn svg { width:22px; height:22px; fill:none; stroke:currentColor; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
        .send-btn.stop-mode { background:#1a1a1f; color:#fff; border:1px solid rgba(255,255,255,0.2); }
        .send-btn.stop-mode:hover { background:#2a2a35; }
        .send-btn.stop-mode svg { width:14px; height:14px; fill:currentColor; stroke:none; }

        /* modal */
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.3s; backdrop-filter:blur(10px); }
        .modal-overlay.active { opacity:1; pointer-events:auto; }
        .modal-overlay img { max-width:95%; max-height:95%; border-radius:12px; box-shadow:0 10px 40px rgba(0,0,0,0.5); }
        .modal-close { position:absolute; top:20px; right:20px; background:rgba(255,255,255,0.1); border:none; color:#fff; width:40px; height:40px; border-radius:50%; font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:10px; }
        ::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<!-- ===== ПРЕЛОАДЕР ===== -->
<div class="preloader" id="preloader">
    <div class="preloader-logo">StudyBox</div>
    <div class="progress-container"><div class="progress-bar"></div></div>
</div>

<!-- ===== ХЕДЕР ===== -->
<header class="header">
    <a href="/" class="header__back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Назад
    </a>
    <div class="header__logo">StudyBox AI</div>
    <div style="width:70px;"></div>
</header>

<!-- ===== HELLO ===== -->
<div class="hello-screen" id="helloScreen">
    <h1 class="hello-title">С чего начнём?</h1>
</div>

<!-- ===== ЧАТ ===== -->
<div class="chat-container" id="chatContainer">
    <!-- сюда будут вставляться сообщения -->
</div>

<!-- ===== МОДАЛКА ДЛЯ КАРТИНОК ===== -->
<div class="modal-overlay" id="imageModal" onclick="closeModals()">
    <button class="modal-close" onclick="closeModals()">&times;</button>
    <img id="modalImage" src="" alt="fullscreen" onclick="event.stopPropagation()" />
</div>

<!-- ===== ВВОД ===== -->
<div class="input-area">
    <div class="input-wrapper">
        <div class="attachments-container" id="attachmentsContainer"></div>
        <div class="input-row">
            <button class="plus-btn" id="plusBtn" onclick="document.getElementById('fileInput').click()">
                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <input type="file" id="fileInput" multiple accept="image/*" style="display:none;" onchange="handleFiles(event)" />
            <textarea id="userInput" rows="1" placeholder="Задай вопрос или прикрепи фото..." oninput="autoResize(this)" onkeydown="handleEnter(event)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="handleSendClick()">
                <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
            </button>
        </div>
    </div>
</div>

<script>
// ===== ЗАЩИТА ОТ СПАРСИНГА: разбиваем ключевые строки на куски =====
const _0x = ['73','6b','2d','6f','72','2d','76','31','2d','33','39','66','31','38','30','33','66','34','35','39','38','31','33','31','33','35','37','36','32','66','35','65','34','62','39','37','36','36','62','66','61','30','62','39','35','31','36','63','64','39','63','65','34','37','61','33','63','64','63','33','66','64','61','32','62','65','38','64','65','35','37','34','37','3f'];
function _d(hex) { return hex.match(/.{1,2}/g).map(b=>String.fromCharCode(parseInt(b,16))).join(''); }
const API_KEY = _d(_0x.join(''));
const MODEL = 'deepseek/deepseek-v4-flash:exacto';

let chatHistory = [{ role: "system", content: "Ты — StudyBox AI, интеллектуальный помощник. Отвечай только на русском, используй LaTeX для формул, давай структурированные ответы. Не используй web-поиск. Всегда отвечай порционно, не выливай всю информацию сразу." }];

const chatContainer = document.getElementById('chatContainer');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const helloScreen = document.getElementById('helloScreen');
const attachmentsContainer = document.getElementById('attachmentsContainer');
let attachedFiles = [];
let isGenerating = false;
let abortController = null;
let isFirstMessage = true;

// ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
function autoResize(el) { el.style.height='40px'; el.style.height=Math.min(el.scrollHeight,200)+'px'; }
function handleEnter(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault(); handleSendClick();} }

function handleFiles(e) {
    const files = Array.from(e.target.files);
    if (attachedFiles.length + files.length > 10) { alert("Максимум 10 изображений"); e.target.value=''; return; }
    files.forEach(f => {
        if (!f.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            attachedFiles.push({ type:'image', data:ev.target.result, name:f.name });
            renderAttachments();
        };
        reader.readAsDataURL(f);
    });
    e.target.value='';
}
function removeFile(idx) { attachedFiles.splice(idx,1); renderAttachments(); }
function renderAttachments() {
    attachmentsContainer.innerHTML='';
    if(attachedFiles.length===0){ attachmentsContainer.style.display='none'; return; }
    attachmentsContainer.style.display='flex';
    attachedFiles.forEach((f,i)=>{
        const div = document.createElement('div');
        div.className='attachment-item';
        div.innerHTML = `
            <img src="${f.data}" alt="attach" onclick="openImageModal('${f.data}')" />
            <button class="attachment-remove" onclick="removeFile(${i})">&times;</button>
        `;
        attachmentsContainer.appendChild(div);
    });
}

function openImageModal(src) {
    document.getElementById('modalImage').src = src;
    document.getElementById('imageModal').classList.add('active');
}
function closeModals() {
    document.getElementById('imageModal').classList.remove('active');
}

// ===== ИНДИКАТОР ПЕЧАТИ (анимированные точки) =====
function createTypingIndicator() {
    const wrapper = document.createElement('div');
    wrapper.className = 'typing-indicator';
    wrapper.id = 'typingIndicator';
    for(let i=0;i<3;i++){ const dot=document.createElement('div'); dot.className='typing-dot'; wrapper.appendChild(dot); }
    return wrapper;
}

function showTyping() {
    const existing = document.getElementById('typingIndicator');
    if(existing) existing.remove();
    chatContainer.appendChild(createTypingIndicator());
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if(el) el.remove();
}

// ===== ОТПРАВКА СООБЩЕНИЯ (с потоковым выводом) =====
async function sendMessage() {
    const text = userInput.value.trim();
    if (!text && attachedFiles.length===0) return;
    if (isFirstMessage) { helloScreen.classList.add('hidden'); isFirstMessage=false; }

    userInput.value=''; userInput.style.height='40px';
    const filesToSend = [...attachedFiles];
    // выводим сообщение пользователя
    appendUserMessage(text, filesToSend);
    // собираем контент для API
    let apiContent = [];
    if (text) apiContent.push({ type:"text", text:text });
    filesToSend.forEach(f => {
        if(f.type==='image') apiContent.push({ type:"image_url", image_url:{ url:f.data } });
    });
    chatHistory.push({ role:"user", content: apiContent.length===1 ? apiContent[0].text : apiContent });
    attachedFiles=[]; renderAttachments();

    // готовим запрос
    const messagesToSend = [chatHistory[0], ...chatHistory.slice(-5)];
    isGenerating = true;
    sendBtn.classList.add('stop-mode');
    sendBtn.innerHTML = `<svg viewBox="0 0 24 24"><rect x="7" y="7" width="10" height="10" rx="2"></rect></svg>`;
    userInput.disabled = true;
    document.getElementById('plusBtn').style.pointerEvents='none';
    document.getElementById('plusBtn').style.opacity='0.5';

    showTyping();
    abortController = new AbortController();

    try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                model: MODEL,
                messages: messagesToSend,
                max_tokens: 4000,
                temperature: 0.4,
                stream: true
            }),
            signal: abortController.signal
        });

        if (!response.ok) throw new Error("Сетевая ошибка");
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullContent = '';
        let aiMessageDiv = null;
        let contentDiv = null;

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    const payload = line.slice(6);
                    if (payload === '[DONE]') continue;
                    try {
                        const json = JSON.parse(payload);
                        const delta = json.choices[0]?.delta?.content;
                        if (delta) {
                            if (!aiMessageDiv) {
                                hideTyping();
                                aiMessageDiv = document.createElement('div');
                                aiMessageDiv.className = 'message ai';
                                const sender = document.createElement('div');
                                sender.className = 'message-sender';
                                sender.innerText = 'StudyBox AI';
                                aiMessageDiv.appendChild(sender);
                                contentDiv = document.createElement('div');
                                contentDiv.className = 'message-content';
                                aiMessageDiv.appendChild(contentDiv);
                                chatContainer.appendChild(aiMessageDiv);
                            }
                            fullContent += delta;
                            // обновляем содержимое с разметкой
                            contentDiv.innerHTML = marked.parse(fullContent);
                            // применяем подсветку и формулы
                            contentDiv.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
                            if (window.renderMathInElement) {
                                renderMathInElement(contentDiv, { delimiters: [{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}], throwOnError:false });
                            }
                            // обрабатываем таблицы
                            contentDiv.querySelectorAll('table').forEach(table => {
                                if (!table.closest('.table-wrapper')) {
                                    const wrap = document.createElement('div');
                                    wrap.className = 'table-wrapper';
                                    table.parentNode.insertBefore(wrap, table);
                                    wrap.appendChild(table);
                                }
                            });
                            // обрабатываем код-блоки
                            contentDiv.querySelectorAll('pre').forEach(pre => {
                                if (pre.closest('.code-block-wrapper')) return;
                                const wrapper = document.createElement('div');
                                wrapper.className = 'code-block-wrapper';
                                const header = document.createElement('div');
                                header.className = 'code-header';
                                const code = pre.querySelector('code');
                                let lang = 'code';
                                if (code && code.className) {
                                    const m = code.className.match(/language-(\w+)/);
                                    if (m) lang = m[1];
                                }
                                header.innerHTML = `<span>${lang}</span>`;
                                const copyBtn = document.createElement('button');
                                copyBtn.className = 'copy-btn';
                                copyBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Копировать`;
                                copyBtn.onclick = () => {
                                    navigator.clipboard.writeText(code.innerText);
                                    copyBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg> Скопировано`;
                                    setTimeout(() => copyBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Копировать`, 2000);
                                };
                                header.appendChild(copyBtn);
                                pre.parentNode.insertBefore(wrapper, pre);
                                wrapper.appendChild(header);
                                wrapper.appendChild(pre);
                            });
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                        }
                    } catch(e) {}
                }
            }
        }
        // сохраняем историю
        chatHistory.push({ role:"assistant", content: fullContent });
        hideTyping();
        if (!aiMessageDiv && fullContent) {
            // если по какой-то причине не создали сообщение — создаём
            const dummy = document.createElement('div');
            dummy.className = 'message ai';
            dummy.innerHTML = `<div class="message-sender">StudyBox AI</div><div class="message-content">${marked.parse(fullContent)}</div>`;
            chatContainer.appendChild(dummy);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    } catch (err) {
        if (err.name !== 'AbortError') {
            hideTyping();
            const errMsg = document.createElement('div');
            errMsg.className = 'message ai';
            errMsg.innerHTML = `<div class="message-sender">StudyBox AI</div><div class="message-content">⚠️ Произошла ошибка. Попробуйте ещё раз.</div>`;
            chatContainer.appendChild(errMsg);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    } finally {
        isGenerating = false;
        sendBtn.classList.remove('stop-mode');
        sendBtn.innerHTML = `<svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>`;
        userInput.disabled = false;
        document.getElementById('plusBtn').style.pointerEvents='auto';
        document.getElementById('plusBtn').style.opacity='1';
        userInput.focus();
    }
}

// ===== ВСПОМОГАТЕЛЬНАЯ ФУНКЦИЯ ДЛЯ ВЫВОДА СООБЩЕНИЯ ПОЛЬЗОВАТЕЛЯ =====
function appendUserMessage(text, files) {
    const div = document.createElement('div');
    div.className = 'message user';
    div.innerHTML = `<div class="message-sender">Вы</div><div class="message-content">${text}</div>`;
    if (files.length > 0) {
        const gallery = document.createElement('div');
        gallery.className = 'image-gallery';
        files.forEach(f => {
            if (f.type === 'image') {
                const img = document.createElement('img');
                img.src = f.data;
                img.style.width = '100%';
                img.style.aspectRatio = '1';
                img.style.objectFit = 'cover';
                img.style.borderRadius = '12px';
                img.style.cursor = 'pointer';
                img.onclick = () => openImageModal(f.data);
                gallery.appendChild(img);
            }
        });
        div.querySelector('.message-content').appendChild(gallery);
    }
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

// ===== ОБРАБОТЧИК КНОПКИ ОТПРАВКИ / СТОП =====
function handleSendClick() {
    if (isGenerating) {
        if (abortController) abortController.abort();
        isGenerating = false;
        sendBtn.classList.remove('stop-mode');
        sendBtn.innerHTML = `<svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>`;
        userInput.disabled = false;
        document.getElementById('plusBtn').style.pointerEvents='auto';
        document.getElementById('plusBtn').style.opacity='1';
        hideTyping();
        return;
    }
    sendMessage();
}

// ===== ЗАГРУЗКА СТРАНИЦЫ =====
window.addEventListener('load', ()=>{
    setTimeout(()=>document.getElementById('preloader').classList.add('hidden'), 1000);
    userInput.focus();
});
</script>
