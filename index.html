<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyBox — Доступ ограничен</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #007aff;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
            overflow: hidden;
        }

        /* Контейнер формы */
        .restriction-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        /* Иконка щита */
        .icon-wrapper {
            font-size: 60px;
            color: var(--accent-color);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 16px;
            line-height: 1.5;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .brand-name {
            font-weight: 700;
            color: var(--text-main);
        }

        /* Скрываем контент по умолчанию */
        #main-content { display: none; }
        #blocking-screen { display: none; }
    </style>
</head>
<body>

    <div id="blocking-screen">
        <div class="restriction-card">
            <div class="icon-wrapper">
                <i class="fas fa-shield-halved"></i>
            </div>
            <h1>Доступ ограничен</h1>
            <p>К сожалению, <span class="brand-name">StudyBox</span> на данный момент еще не поддерживает работу в вашем регионе.</p>
            <p style="font-size: 13px;">Мы работаем над расширением географии сервиса.</p>
        </div>
    </div>

    <div id="main-content">
        <h1>Добро пожаловать в StudyBox</h1>
    </div>

    <script>
        async function checkLocation() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();

                if (data.country_code === 'BY') {
                    // Если Беларусь — показываем щит
                    document.getElementById('blocking-screen').style.display = 'flex';
                } else {
                    // Если любая другая страна — показываем сайт
                    document.getElementById('main-content').style.display = 'block';
                }
            } catch (error) {
                console.error('Ошибка проверки геолокации:', error);
                // На случай ошибки API лучше оставить доступ открытым или наоборот закрыть
                document.getElementById('main-content').style.display = 'block';
            }
        }

        checkLocation();
    </script>
</body>
</html>
