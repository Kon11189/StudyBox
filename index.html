<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyBox - Проверка доступа</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Основной контент сайта (скрыт до проверки) */
        #main-content {
            padding: 20px;
            display: none;
            text-align: center;
        }

        /* Баннер блокировки */
        #geo-blocker {
            display: none; /* Скрыто по умолчанию */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.98); /* Полупрозрачный белый фон */
            z-content: 10000;
            flex-direction: column;
            justify-content: flex-start;
            padding: 20px;
            box-sizing: border-box;
            opacity: 0; /* Для анимации появления */
            transition: opacity 0.3s ease;
        }

        /* Показываем баннер с анимацией */
        #geo-blocker.active {
            display: flex;
            opacity: 1;
        }

        /* Логотип StudyBox (слева вверху) */
        .logo-container {
            align-self: flex-start;
            margin-bottom: 20px;
        }

        .header-logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .blue-s {
            color: #007bff; /* Красивый синий */
        }

        .black-text {
            color: #1a1a1a;
        }

        /* Центральная карточка */
        .card {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 500px;
            margin: auto; /* Центрируем по вертикали и горизонтали внутри flex-контейнера */
        }

        .cat-container {
            margin-bottom: 30px;
        }

        .cat-icon {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid #e9ecef;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .ups-title {
            font-size: 2rem;
            font-weight: bold;
            color: #212529;
            margin: 0 0 15px 0;
        }

        .region-text {
            font-size: 1.1rem;
            color: #6c757d;
            margin: 0 0 15px 0;
        }

        .description {
            font-size: 1rem;
            color: #495057;
            line-height: 1.6;
        }

    </style>
</head>
<body>

    <div id="main-content">
        <h1>Рады видеть вас в StudyBox!</h1>
        <p>Изучайте курсы и развивайтесь с нами.</p>
    </div>

    <div id="geo-blocker">
        <div class="logo-container">
            <span class="header-logo"><span class="blue-s">S</span><span class="black-text">tudyBox</span></span>
        </div>

        <div class="card">
            <div class="cat-container">
                <img src="https://i.ibb.co/ccCBLDbg/1772994999425.png" alt="Кот" class="cat-icon">
            </div>
            <h1 class="ups-title">Упс...</h1>
            <p class="region-text">Этот регион пока недоступен.</p>
            <p class="description">Мы активно работаем над расширением списка стран и регионов. Надеемся на скорую встречу!</p>
        </div>
    </div>

    <script>
        async function checkLocation() {
            try {
                // ПРИМЕЧАНИЕ: Бесплатный тариф ipapi.co имеет лимиты. В продакшене используйте платные API или серверную проверку.
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();

                // Проверка на Беларусь (Код страны: BY)
                if (data.country_code === 'BY') {
                    const blk = document.getElementById('geo-blocker');
                    blk.style.display = 'flex'; // Показываем, чтобы работала анимация
                    setTimeout(() => blk.classList.add('active'), 50); // Плавное появление
                    
                    document.getElementById('main-content').style.display = 'none';
                } else {
                    document.getElementById('main-content').style.display = 'block';
                }
            } catch (error) {
                console.error("Ошибка при проверке геолокации:", error);
                // На случай ошибки API лучше по умолчанию пустить на сайт.
                document.getElementById('main-content').style.display = 'block';
            }
        }

        // Запускаем проверку при загрузке страницы
        checkLocation();
    </script>
</body>
</html>
