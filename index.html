<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyBox - Проверка доступа</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
        }

        /* Основной контент сайта (скрыт до проверки) */
        #main-content {
            padding: 20px;
            display: none; 
        }

        /* Стили баннера блокировки */
        #geo-blocker {
            display: none; /* Показываем только если РБ */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            z-index: 10000;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            box-sizing: border-box;
        }

        .header-logo {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .content-center {
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .content-center h1 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .footer-error {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .cat-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
        }

        .error-text {
            font-size: 1.2rem;
            color: #666;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div id="main-content">
        <h1>Добро пожаловать в StudyBox!</h1>
        <p>Этот контент доступен для вашего региона.</p>
    </div>

    <div id="geo-blocker">
        <div class="header-logo">StudyBox</div>

        <div class="content-center">
            <h1>Извините, ваш регион временно недоступен</h1>
            <p>Мы активно работаем над расширением списка поддерживаемых стран. Оставайтесь на связи!</p>
        </div>

        <div class="footer-error">
            <img src="https://i.ibb.co/ccCBLDbg/1772994999425.png" alt="Кот" class="cat-icon">
            <span class="error-text">Упс..</span>
        </div>
    </div>

    <script>
        async function checkLocation() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();

                // Проверка на Беларусь (Код страны: BY)
                if (data.country_code === 'BY') {
                    document.getElementById('geo-blocker').style.display = 'flex';
                    document.getElementById('main-content').style.display = 'none';
                } else {
                    document.getElementById('main-content').style.display = 'block';
                }
            } catch (error) {
                console.error("Ошибка при проверке геолокации:", error);
                // На случай ошибки API лучше по умолчанию пустить на сайт 
                // или наоборот заблокировать (зависит от политики)
                document.getElementById('main-content').style.display = 'block';
            }
        }

        checkLocation();
    </script>
</body>
</html>
