<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>✨ Шарик-Попрыгун: Бусты и Полёт ✨</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #0b1a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Comic Sans MS', cursive, sans-serif;
    }
    canvas {
      display: block;
      /* Заполняем весь экран без сохранения пропорций (во весь экран) */
      object-fit: cover;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at 20% 20%, #b3e1f0, #6ec3e0);
      touch-action: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas" width="900" height="500"></canvas>
<script>
  (function(){
    "use strict";

    // ---------- НАСТРОЙКИ ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Игровое разрешение фиксированное, растягивается через CSS cover
    const WORLD_WIDTH = 900;
    const WORLD_HEIGHT = 500;
    canvas.width = WORLD_WIDTH;
    canvas.height = WORLD_HEIGHT;
    
    // Земля
    const GROUND_Y = 440;
    const GROUND_HEIGHT = 60;
    const PLAYER_RADIUS = 22;
    
    // Увеличенная физика для более быстрой игры
    const GRAVITY = 0.55;          // было 0.45
    const JUMP_FORCE = -12.5;      // было -11.5
    const MAX_FALL_SPEED = 14;
    
    // Увеличенная базовая скорость (игра быстрее)
    const BASE_SCROLL_SPEED = 6.5;  // было 4.2
    let scrollSpeed = BASE_SCROLL_SPEED;
    
    // Генерация препятствий (чаще, так как игра быстрее)
    const MIN_OBS_DIST = 260;
    const MAX_OBS_DIST = 380;
    let nextObstacleDist = 240;
    let obstaclesSpawned = 0;
    
    // ---------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------
    let gameActive = true;
    let gameOverFlag = false;
    let score = 0;
    let frame = 0;
    let autoRestartTimer = null;
    
    let player = {
      x: 200,
      y: GROUND_Y - PLAYER_RADIUS,
      vy: 0,
      radius: PLAYER_RADIUS,
      grounded: false,
      canDoubleJump: false,
      doubleJumpUsed: false,
      doubleJumpCooldown: 0,
      shield: false,
      shieldTimer: 0,
      speedBoost: false,
      speedTimer: 0,
      magnet: false,
      magnetTimer: 0,
      flightMode: false,
      particles: []
    };
    
    let obstacles = [];
    let bonuses = [];
    
    const BOOST_TYPES = {
      DOUBLE_JUMP: 'doubleJump',
      SHIELD: 'shield',
      SPEED: 'speed',
      MAGNET: 'magnet',
      SCORE: 'score'
    };
    
    function formatScore(pts) {
      return String(Math.floor(pts)).padStart(5, '0');
    }
    
    // ---------- ГЕНЕРАТОРЫ ----------
    function createObstacle(xPos) {
      obstaclesSpawned++;
      let width, height, yOffset, color, pattern, extra;
      let typeGroup = Math.floor(Math.random() * 56);
      
      const baseWidth = 24 + Math.floor(Math.random() * 28);
      const baseHeight = 20 + Math.floor(Math.random() * 32);
      
      if (typeGroup < 8) {
        width = baseWidth;
        height = baseHeight;
        yOffset = 0;
        const hue = (typeGroup * 37) % 360;
        color = `hsl(${hue}, 80%, 55%)`;
        pattern = 'solid';
      } else if (typeGroup < 16) {
        width = baseWidth + 8;
        height = baseHeight - 4;
        yOffset = 0;
        const hue1 = (typeGroup * 23) % 360;
        const hue2 = (hue1 + 40) % 360;
        color = `hsl(${hue1}, 85%, 60%)`;
        pattern = 'striped';
        extra = { stripeColor: `hsl(${hue2}, 90%, 50%)`, stripeWidth: 6 };
      } else if (typeGroup < 24) {
        width = baseWidth + 6;
        height = baseHeight + 2;
        yOffset = 0;
        color = `hsl(${typeGroup * 20}, 75%, 65%)`;
        pattern = 'face';
        extra = { eyeType: typeGroup % 3 };
      } else if (typeGroup < 32) {
        width = baseWidth + 10;
        height = baseHeight - 6;
        yOffset = 0;
        color = `hsl(${typeGroup * 18}, 70%, 45%)`;
        pattern = 'spiky';
        extra = { spikes: 4 + (typeGroup % 5) };
      } else if (typeGroup < 40) {
        width = baseWidth * 1.2;
        height = baseHeight * 0.8;
        yOffset = 0;
        color = `hsl(${typeGroup * 13}, 80%, 60%)`;
        pattern = 'tower';
        extra = { segments: 2 + (typeGroup % 3) };
      } else if (typeGroup < 48) {
        width = baseWidth;
        height = baseHeight;
        yOffset = 0;
        color = `hsl(${typeGroup * 27}, 85%, 65%)`;
        pattern = 'star';
        extra = { points: 5 };
      } else {
        width = baseWidth - 4;
        height = baseHeight * 0.6;
        yOffset = -12 - (typeGroup % 4) * 4;
        color = `hsl(${typeGroup * 31}, 75%, 58%)`;
        pattern = 'floating';
        extra = { shadow: true };
      }
      
      const variant = Math.floor(Math.random() * 4);
      if (variant === 1 && yOffset === 0) {
        height = Math.max(20, height * 0.85);
        width = width * 1.1;
      } else if (variant === 2) {
        yOffset = -5;
      }
      
      height = Math.min(62, Math.max(20, height));
      width = Math.min(78, Math.max(20, width));
      
      return {
        x: xPos,
        width, height,
        y: GROUND_Y - height - yOffset,
        color, pattern, extra,
        countedForScore: false
      };
    }
    
    function createBonus(xPos) {
      const rand = Math.random();
      let type, color, symbol;
      if (rand < 0.2) { type = BOOST_TYPES.DOUBLE_JUMP; color = '#4CAF50'; symbol = '🦘'; }
      else if (rand < 0.45) { type = BOOST_TYPES.SHIELD; color = '#2196F3'; symbol = '🛡️'; }
      else if (rand < 0.7) { type = BOOST_TYPES.SPEED; color = '#FF9800'; symbol = '⚡'; }
      else if (rand < 0.9) { type = BOOST_TYPES.MAGNET; color = '#9C27B0'; symbol = '🧲'; }
      else { type = BOOST_TYPES.SCORE; color = '#FFD700'; symbol = '⭐'; }
      
      const size = 30;
      const yOffset = -25 - Math.random() * 50;
      return {
        x: xPos,
        y: GROUND_Y - size/2 + yOffset,
        size: size,
        type: type,
        color: color,
        symbol: symbol,
        collected: false,
        angle: Math.random() * Math.PI*2,
        floatAmp: Math.random() * 10 + 5,
        floatPhase: Math.random() * 10
      };
    }
    
    function resetGame() {
      if (autoRestartTimer) clearTimeout(autoRestartTimer);
      gameActive = true;
      gameOverFlag = false;
      score = 0;
      scrollSpeed = BASE_SCROLL_SPEED;
      frame = 0;
      obstaclesSpawned = 0;
      
      player.y = GROUND_Y - PLAYER_RADIUS;
      player.vy = 0;
      player.grounded = true;
      player.canDoubleJump = false;
      player.doubleJumpUsed = false;
      player.doubleJumpCooldown = 0;
      player.shield = false;
      player.shieldTimer = 0;
      player.speedBoost = false;
      player.speedTimer = 0;
      player.magnet = false;
      player.magnetTimer = 0;
      player.flightMode = false;
      player.particles = [];
      
      obstacles = [];
      bonuses = [];
      
      let firstX = player.x + 350;
      for (let i=0; i<3; i++) {
        obstacles.push(createObstacle(firstX + i*350));
      }
      bonuses.push(createBonus(firstX + 500));
      
      nextObstacleDist = 260;
    }
    
    function scheduleRestart() {
      if (autoRestartTimer) clearTimeout(autoRestartTimer);
      autoRestartTimer = setTimeout(() => resetGame(), 1200);
    }
    
    function addParticles(x, y, color, count=8) {
      for (let i=0; i<count; i++) {
        player.particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.5) * 6 - 2,
          size: 4 + Math.random()*6,
          color: color,
          life: 1.0
        });
      }
    }
    
    function update() {
      if (!gameActive) return;
      
      if (player.doubleJumpCooldown > 0) player.doubleJumpCooldown--;
      if (player.shieldTimer > 0) {
        player.shieldTimer--;
        if (player.shieldTimer <= 0) player.shield = false;
      }
      
      if (player.speedTimer > 0) {
        player.speedTimer--;
        if (player.speedTimer <= 0) {
          player.speedBoost = false;
          player.flightMode = false;
        }
        if (player.speedBoost && !player.flightMode) {
          player.flightMode = true;
          player.vy = -6;
        }
        scrollSpeed = player.speedBoost ? BASE_SCROLL_SPEED * 2.0 : BASE_SCROLL_SPEED;
      } else {
        scrollSpeed = BASE_SCROLL_SPEED;
      }
      
      if (player.magnetTimer > 0) {
        player.magnetTimer--;
        if (player.magnetTimer <= 0) player.magnet = false;
      }
      
      if (player.flightMode) {
        player.vy += GRAVITY * 0.3;
        if (player.y > GROUND_Y - 100) player.vy -= 0.8;
        if (player.vy > 10) player.vy = 10;
      } else {
        player.vy += GRAVITY;
      }
      
      if (player.vy > MAX_FALL_SPEED) player.vy = MAX_FALL_SPEED;
      player.y += player.vy;
      
      const floorLevel = GROUND_Y - player.radius;
      if (player.y >= floorLevel) {
        player.y = floorLevel;
        player.vy = 0;
        player.grounded = true;
        player.doubleJumpUsed = false;
        if (player.flightMode) player.flightMode = false;
      } else {
        player.grounded = false;
      }
      
      for (let obs of obstacles) obs.x -= scrollSpeed;
      for (let bonus of bonuses) {
        bonus.x -= scrollSpeed;
        bonus.angle += 0.03;
        if (player.magnet && !bonus.collected) {
          const dx = player.x - (bonus.x + bonus.size/2);
          const dy = player.y - (bonus.y + bonus.size/2);
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 220) {
            bonus.x += dx * 0.1;
            bonus.y += dy * 0.1;
          }
        }
      }
      
      obstacles = obstacles.filter(obs => obs.x + obs.width > -50);
      bonuses = bonuses.filter(b => b.x + b.size > -50 && !b.collected);
      
      let rightmostX = Math.max(...obstacles.map(o => o.x), ...bonuses.map(b => b.x), 0);
      if (rightmostX < WORLD_WIDTH + nextObstacleDist) {
        let newX = Math.max(WORLD_WIDTH + 50, rightmostX + MIN_OBS_DIST + Math.random() * (MAX_OBS_DIST - MIN_OBS_DIST));
        obstacles.push(createObstacle(newX));
        
        if (obstaclesSpawned % 5 === 0 || Math.random() < 0.15) {
          let bonusX = newX - 100 - Math.random() * 120;
          if (bonusX > player.x + 150) bonuses.push(createBonus(bonusX));
        }
        
        nextObstacleDist = MIN_OBS_DIST + Math.random() * 110;
      }
      
      if (!player.shield && !player.flightMode) {
        for (let obs of obstacles) {
          const dx = player.x - Math.max(obs.x, Math.min(player.x, obs.x + obs.width));
          const dy = player.y - Math.max(obs.y, Math.min(player.y, obs.y + obs.height));
          if (Math.sqrt(dx*dx + dy*dy) < player.radius) {
            gameActive = false;
            gameOverFlag = true;
            addParticles(player.x, player.y, '#FF5252', 20);
            scheduleRestart();
            break;
          }
        }
      }
      
      for (let bonus of bonuses) {
        if (bonus.collected) continue;
        const dx = player.x - (bonus.x + bonus.size/2);
        const dy = player.y - (bonus.y + bonus.size/2);
        if (Math.sqrt(dx*dx + dy*dy) < player.radius + bonus.size/2) {
          bonus.collected = true;
          addParticles(bonus.x + bonus.size/2, bonus.y + bonus.size/2, bonus.color, 14);
          
          switch(bonus.type) {
            case BOOST_TYPES.DOUBLE_JUMP:
              player.canDoubleJump = true;
              player.doubleJumpCooldown = 0;
              break;
            case BOOST_TYPES.SHIELD:
              player.shield = true;
              player.shieldTimer = 300;
              break;
            case BOOST_TYPES.SPEED:
              player.speedBoost = true;
              player.speedTimer = 360;
              player.flightMode = true;
              break;
            case BOOST_TYPES.MAGNET:
              player.magnet = true;
              player.magnetTimer = 400;
              break;
            case BOOST_TYPES.SCORE:
              score += 150;
              break;
          }
          score += 40;
        }
      }
      
      for (let obs of obstacles) {
        if (!obs.countedForScore && (obs.x + obs.width) < player.x - 20) {
          obs.countedForScore = true;
          score += 15;
        }
      }
      if (frame % 3 === 0) score += 1;
      
      player.particles = player.particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.15;
        p.life -= 0.015;
        return p.life > 0;
      });
      
      frame++;
    }
    
    function jump() {
      if (!gameActive) {
        resetGame();
        return;
      }
      
      if (player.grounded) {
        player.vy = JUMP_FORCE;
        player.grounded = false;
        player.doubleJumpUsed = false;
        addParticles(player.x, player.y + player.radius, '#FFD966', 6);
      }
      else if (player.canDoubleJump && !player.doubleJumpUsed && player.doubleJumpCooldown <= 0) {
        player.vy = JUMP_FORCE * 0.9;
        player.doubleJumpUsed = true;
        player.canDoubleJump = false;
        player.doubleJumpCooldown = 1000; // ~16 сек при 60fps
        addParticles(player.x, player.y, '#4CAF50', 10);
      }
    }
    
    function draw() {
      ctx.clearRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT);
      
      const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
      grad.addColorStop(0, '#b3e1f0');
      grad.addColorStop(0.8, '#f9e7b3');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, WORLD_WIDTH, GROUND_Y);
      
      ctx.fillStyle = '#ffffffc0';
      for (let i=0; i<6; i++) {
        let cloudX = (i*220 + frame*0.5) % (WORLD_WIDTH+200) - 100;
        ctx.beginPath();
        ctx.arc(cloudX, 40, 30, 0, 2*Math.PI);
        ctx.arc(cloudX+40, 25, 28, 0, 2*Math.PI);
        ctx.arc(cloudX+80, 40, 30, 0, 2*Math.PI);
        ctx.fill();
      }
      
      ctx.fillStyle = '#6f9e4c';
      ctx.fillRect(0, GROUND_Y, WORLD_WIDTH, GROUND_HEIGHT);
      ctx.fillStyle = '#5c8a3b';
      for (let i=0; i<WORLD_WIDTH; i+=30) {
        ctx.beginPath();
        ctx.moveTo(i, GROUND_Y);
        ctx.lineTo(i+15, GROUND_Y-12);
        ctx.lineTo(i+30, GROUND_Y);
        ctx.fill();
      }
      
      for (let bonus of bonuses) {
        if (bonus.collected) continue;
        const floatY = Math.sin(frame*0.15 + bonus.floatPhase) * bonus.floatAmp;
        const cx = bonus.x + bonus.size/2;
        const cy = bonus.y + bonus.size/2 + floatY;
        
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(bonus.angle);
        ctx.shadowColor = bonus.color;
        ctx.shadowBlur = 18;
        
        ctx.fillStyle = bonus.color;
        ctx.beginPath();
        if (bonus.type === BOOST_TYPES.SCORE) {
          drawStar(ctx, 0, 0, 5, bonus.size/2, bonus.size/4);
        } else {
          ctx.arc(0, 0, bonus.size/2, 0, 2*Math.PI);
        }
        ctx.fill();
        ctx.shadowBlur = 10;
        ctx.strokeStyle = '#FFF';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.font = 'bold 22px "Segoe UI"';
        ctx.fillStyle = '#FFF';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(bonus.symbol, 0, 0);
        ctx.restore();
      }
      
      for (let obs of obstacles) {
        const x = obs.x, y = obs.y, w = obs.width, h = obs.height;
        ctx.fillStyle = obs.color;
        ctx.fillRect(x, y, w, h);
        if (obs.pattern === 'striped' && obs.extra) {
          ctx.fillStyle = obs.extra.stripeColor;
          for (let i=0; i<w; i+=12) ctx.fillRect(x+i, y, 6, h);
        } else if (obs.pattern === 'face') {
          ctx.fillStyle = '#FFF';
          ctx.beginPath();
          ctx.arc(x+w*0.35, y+h*0.35, 6, 0, 2*Math.PI);
          ctx.arc(x+w*0.65, y+h*0.35, 6, 0, 2*Math.PI);
          ctx.fill();
          ctx.fillStyle = '#000';
          ctx.beginPath();
          ctx.arc(x+w*0.35, y+h*0.33, 3, 0, 2*Math.PI);
          ctx.arc(x+w*0.65, y+h*0.33, 3, 0, 2*Math.PI);
          ctx.fill();
        }
        ctx.strokeStyle = '#2d1f0e';
        ctx.lineWidth = 3;
        ctx.strokeRect(x, y, w, h);
      }
      
      for (let p of player.particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, 2*Math.PI);
        ctx.fill();
      }
      ctx.globalAlpha = 1.0;
      
      ctx.shadowColor = '#3a1f1f';
      ctx.shadowBlur = 12;
      ctx.fillStyle = '#1f3a1faa';
      ctx.beginPath();
      ctx.ellipse(player.x, GROUND_Y+4, player.radius*1.1, 8, 0, 0, 2*Math.PI);
      ctx.fill();
      
      const gradBall = ctx.createRadialGradient(player.x-8, player.y-8, 5, player.x, player.y, player.radius+5);
      gradBall.addColorStop(0, '#ff6b6b');
      gradBall.addColorStop(0.7, '#cc0000');
      gradBall.addColorStop(1, '#8b0000');
      ctx.fillStyle = gradBall;
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.radius, 0, 2*Math.PI);
      ctx.fill();
      
      if (player.shield) {
        ctx.strokeStyle = '#2196F3';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius+4, 0, 2*Math.PI);
        ctx.stroke();
      }
      if (player.flightMode) {
        ctx.strokeStyle = '#FF9800';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius+6, 0, 2*Math.PI);
        ctx.stroke();
        ctx.fillStyle = '#FFD966';
        ctx.beginPath();
        ctx.moveTo(player.x-15, player.y-5);
        ctx.lineTo(player.x-35, player.y-20);
        ctx.lineTo(player.x-20, player.y-8);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(player.x+15, player.y-5);
        ctx.lineTo(player.x+35, player.y-20);
        ctx.lineTo(player.x+20, player.y-8);
        ctx.fill();
      }
      
      ctx.strokeStyle = '#ffd966';
      ctx.lineWidth = 4;
      ctx.stroke();
      
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#FFF';
      ctx.beginPath();
      ctx.arc(player.x-8, player.y-4, 6, 0, 2*Math.PI);
      ctx.arc(player.x+8, player.y-4, 6, 0, 2*Math.PI);
      ctx.fill();
      ctx.fillStyle = '#1e2b2f';
      ctx.beginPath();
      ctx.arc(player.x-6, player.y-6, 3.5, 0, 2*Math.PI);
      ctx.arc(player.x+10, player.y-6, 3.5, 0, 2*Math.PI);
      ctx.fill();
      ctx.fillStyle = '#FFF';
      ctx.beginPath();
      ctx.arc(player.x-9, player.y-9, 2, 0, 2*Math.PI);
      ctx.arc(player.x+7, player.y-9, 2, 0, 2*Math.PI);
      ctx.fill();
      
      ctx.font = 'bold 30px "Segoe UI"';
      ctx.fillStyle = '#2c2217';
      ctx.fillText('⭐ '+formatScore(score), 20, 50);
      
      let yOff = 85;
      if (player.shield) {
        ctx.fillStyle = '#2196F3';
        ctx.fillRect(20, yOff, 130 * (player.shieldTimer/300), 14);
        ctx.strokeStyle = '#FFF';
        ctx.strokeRect(20, yOff, 130, 14);
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 18px sans-serif';
        ctx.fillText('🛡️ Щит', 20, yOff-5);
        yOff += 30;
      }
      if (player.speedBoost) {
        ctx.fillStyle = '#FF9800';
        ctx.fillRect(20, yOff, 130 * (player.speedTimer/360), 14);
        ctx.strokeRect(20, yOff, 130, 14);
        ctx.fillStyle = '#FFF';
        ctx.fillText('⚡ Суперскорость + Полёт', 20, yOff-5);
        yOff += 30;
      }
      if (player.magnet) {
        ctx.fillStyle = '#9C27B0';
        ctx.fillRect(20, yOff, 130 * (player.magnetTimer/400), 14);
        ctx.strokeRect(20, yOff, 130, 14);
        ctx.fillStyle = '#FFF';
        ctx.fillText('🧲 Магнит', 20, yOff-5);
        yOff += 30;
      }
      
      if (player.doubleJumpCooldown > 0) {
        let cd = player.doubleJumpCooldown / 1000;
        ctx.fillStyle = '#888';
        ctx.fillRect(WORLD_WIDTH-150, 20, 130 * cd, 16);
        ctx.strokeStyle = '#4CAF50';
        ctx.strokeRect(WORLD_WIDTH-150, 20, 130, 16);
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 16px sans-serif';
        ctx.fillText('🦘 перезарядка', WORLD_WIDTH-150, 15);
      } else if (player.canDoubleJump) {
        ctx.fillStyle = '#4CAF50';
        ctx.beginPath();
        ctx.arc(WORLD_WIDTH-45, 45, 22, 0, 2*Math.PI);
        ctx.fill();
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 28px sans-serif';
        ctx.fillText('2', WORLD_WIDTH-55, 55);
      }
      
      if (!gameActive && gameOverFlag) {
        ctx.fillStyle = '#000000aa';
        ctx.fillRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT);
        ctx.font = 'bold 46px "Segoe UI"';
        ctx.fillStyle = '#fee69c';
        ctx.shadowBlur = 14;
        ctx.textAlign = 'center';
        ctx.fillText('😢 ОЙ!', WORLD_WIDTH/2, WORLD_HEIGHT/2-30);
        ctx.font = '28px sans-serif';
        ctx.fillText('Тапни, чтобы продолжить', WORLD_WIDTH/2, WORLD_HEIGHT/2+30);
        ctx.shadowBlur = 0;
        ctx.textAlign = 'left';
      }
    }
    
    function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
      let rot = Math.PI/2*3, step = Math.PI/spikes;
      ctx.beginPath();
      for (let i=0; i<spikes; i++) {
        ctx.lineTo(cx+Math.cos(rot)*outerR, cy+Math.sin(rot)*outerR);
        rot += step;
        ctx.lineTo(cx+Math.cos(rot)*innerR, cy+Math.sin(rot)*innerR);
        rot += step;
      }
      ctx.closePath();
    }
    
    function handleAction(e) {
      e.preventDefault();
      jump();
    }
    
    function gameLoop() {
      if (gameActive) update();
      draw();
      requestAnimationFrame(gameLoop);
    }
    
    function init() {
      resetGame();
      canvas.addEventListener('touchstart', handleAction, {passive: false});
      canvas.addEventListener('mousedown', handleAction);
      window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') { e.preventDefault(); jump(); }
      });
      canvas.addEventListener('contextmenu', e => e.preventDefault());
      gameLoop();
    }
    
    init();
  })();
</script>
</body>
